name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Reconstruct Private Data
        run: |
          mkdir -p data
          [ -f data/awards.b64 ] && base64 -d data/awards.b64 > data/awards.json
          [ -f data/experience.b64 ] && base64 -d data/experience.b64 > data/experience.json
          [ -f data/profile_info.b64 ] && base64 -d data/profile_info.b64 > data/profile_info.json
          [ -f data/projects.b64 ] && base64 -d data/projects.b64 > data/projects.json
          [ -f data/skills.b64 ] && base64 -d data/skills.b64 > data/skills.json
          [ -f data/updates.b64 ] && base64 -d data/updates.b64 > data/updates.json
          echo "✅ Private data reconstructed successfully"

      - name: Build
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_API_KEY: ${{ secrets.REACT_APP_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: "portfolio-data"
          R2_DATA_URL: "https://portfolio-data.aigamer.dev"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./out"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
